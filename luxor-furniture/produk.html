<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />

    <title>Produk</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <header>
      <div class="logo">Luxor Furniture</div>

      <nav>
        <a href="index.html"> Home </a>

      </nav>
    </header>

    <section class="produk">
      <h2>Semua Produk</h2>

            src="https://images.unsplash.com/photo-1555041469-a586c61ea9bc"

          <button onclick="addCart('Sofa Modern', 5000000)">Tambah Cart</button>

        <div class="product">
          <img
            src="https://images.unsplash.com/photo-1592078615290-033ee584e267"
          />

          <h3>Kursi Premium</h3>

          <p>2500000</p>

          <button onclick="addCart('Kursi Premium', 2500000)">
            Tambah Cart
          </button>
        </div>

        <div class="product">
          <img
            src="https://images.unsplash.com/photo-1538688423619-a81d3f23454b"
          />

          <h3>Meja Kayu</h3>

          <p>3000000</p>

          <button onclick="addCart('Meja Kayu', 3000000)">Tambah Cart</button>
        </div>

    <script src="script.js"></script>

</html>
